<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>AI Chatbot</title>

    <link rel="stylesheet" href="/static/css/style.css">

</head>

<body>

<div class="app-container">

    <!-- Sidebar -->
    <div class="sidebar">

        <div class="logo">
            AI Chat
        </div>

        <div class="model-section">

            <label>Select Model</label>

            <select id="model">

                {% for model in models %}

                    <option value="{{ model['value'] }}">
                        {{ model['name'] }}
                    </option>

                {% endfor %}

            </select>


            <div class="settings-section">

                <label>Temperature</label>

                <input
                    type="range"
                    id="temperature"
                    min="0"
                    max="2"
                    step="0.1"
                    value="0.7"
                >

                <span id="temperature-value">0.7</span>

            </div>


            <div class="settings-section">

                <label>Top P</label>

                <input
                    type="range"
                    id="top_p"
                    min="0"
                    max="1"
                    step="0.1"
                    value="0.9"
                >

                <span id="top_p-value">0.9</span>

            </div>


            <div class="settings-section">

                <label>Top K</label>

                <input
                    type="range"
                    id="top_k"
                    min="1"
                    max="100"
                    step="1"
                    value="40"
                >

                <span id="top_k-value">40</span>

            </div>

        </div>

        <div class="row">
            <button class="clear-button" onclick="clearChatHistory()">
                Clear History
            </button>
        </div>

        

    </div>

    <!-- Chat Area -->
    <div class="chat-section">

        <div id="chat-box" class="chat-box"></div>

        <div class="input-container">

            <input
                type="text"
                id="message"
                placeholder="Type your message..."
            >

            <button id="send-btn" onclick="sendMessage()">
                Send
            </button>

        </div>

    </div>

</div>

<script src="/static/js/chat.js"></script>

</body>
</html>
